
<article>
    {{ if .link }}
        <a href="{{ .link }}" class="image no-lightbox">
    {{ else }}
        <a href="{{ .image }}" class="image">
    {{ end }}
        <img src="{{ .thumb }}" alt="" />
    </a>
    <div class="caption">
        <h3>{{ .title }}</h3>
        <p>{{ .content }}</p>
        <ul class="actions fixed">
            <li><span class="button small">{{ .button }}</span></li>
        </ul>
    </div>
</article>
